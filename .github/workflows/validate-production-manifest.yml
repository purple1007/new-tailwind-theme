name: Validate production manifest

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  validate-production-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate production manifest
        run: npm run check:manifest
